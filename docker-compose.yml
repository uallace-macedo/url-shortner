services:
  db:
    image: postgres:16-alpine
    container_name: url_shortner_db
    environment:
      - POSTGRES_USER=${PSQL_USER}
      - POSTGRES_PASSWORD=${PSQL_PSWD}
      - POSTGRES_DB=${PSQL_DBNM}
    ports:
      - "${PSQL_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - private-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PSQL_USER} -d ${PSQL_DBNM}"]
      interval: 5s
      timeout: 5s
      retries: 3
  
  cache:
    image: redis:7-alpine
    container_name: url_shortner_cache
    command: redis-server --requirepass ${RDS_PSWD}
    ports:
      - "${RDS_PORT}:6379"
    networks:
      - private-network
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${RDS_PSWD}", "ping"]
      interval: 5s
      timeout: 3s
      retries: 3
      start_period: 2s
  
  api-java:
    build: ./java-api
    env_file: .env
    environment:
      - RDS_HOST=cache
      - RDS_PORT=6379
      - PSQL_HOST=db
      - PSQL_PORT=5432
    networks:
      - public-network
      - private-network
    ports:
      - ${JAVA_API_PORT}:${JAVA_API_PORT}
    depends_on:
      db:
        condition: service_healthy
      cache:
        condition: service_healthy

  api-go:
    build: ./go-redirector
    env_file: .env
    environment:
      - RDS_HOST=cache
      - RDS_PORT=6379
      - PSQL_HOST=db
      - PSQL_PORT=5432
    networks:
      - public-network
      - private-network
    ports:
      - ${GO_REDIRECTOR_PORT}:${GO_REDIRECTOR_PORT}
    depends_on:
      db:
        condition: service_healthy
      cache:
        condition: service_healthy

  client:
    build:
      context: ./client
      args:
        - VITE_JAVA_API=${VITE_JAVA_API}
        - VITE_GO_RDT=${VITE_GO_RDT}
    ports:
      - ${CLIENT_PORT}:80
    networks:
      - public-network

volumes:
  postgres_data:

networks:
  public-network:
    driver: bridge
  private-network:
    driver: bridge
