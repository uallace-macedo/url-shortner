spring:
  application:
    name: java-api
  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://${PSQL_HOST}:${PSQL_PORT}/${PSQL_DBNM}
    username: ${PSQL_USER}
    password: ${PSQL_PSWD}
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: validate
  flyway:
    enabled: true
    baseline-on-migrate: true
  data:
    redis:
      host: ${RDS_HOST:localhost}
      port: ${RDS_PORT:6379}
      password: ${RDS_PSWD}
      connect-timeout: 2s

server:
  port: ${JAVA_API_PORT}

api:
  security:
    token:
      secret: ${JAVA_JWT_SECRET:secret_jwt}

client:
  host: ${CLIENT_HOST}:${CLIENT_PORT}